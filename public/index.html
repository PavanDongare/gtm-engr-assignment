<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Allica GTM Take‑Home — Demo</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 920px; }
      button { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
      pre { background: #f7f7f9; padding: 12px; border-radius: 8px; overflow: auto; }
      .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      .muted { color: #666; font-size: 14px; }
    </style>
  </head>
  <body>
    <h1>Allica GTM — Hosted Demo</h1>
    <p class="muted">Runs the pipeline on bundled sample leads or a file you choose.</p>
    <div class="row">
      <input type="file" id="file" accept="application/json"/>
      <button id="run">Run Demo</button>
    </div>
    <p id="status"></p>
    <h3>Results</h3>
    <pre id="out">No output yet.</pre>
    <script>
      const elFile = document.getElementById('file');
      const elRun = document.getElementById('run');
      const elOut = document.getElementById('out');
      const elStatus = document.getElementById('status');
      elRun.onclick = async () => {
        elStatus.textContent = 'Running…';
        let body = {};
        if (elFile.files.length) {
          const text = await elFile.files[0].text();
          try { body.leads = JSON.parse(text); } catch { alert('Invalid JSON'); return; }
        }
        const res = await fetch('/run', { method: 'POST', headers: { 'content-type':'application/json' }, body: JSON.stringify(body)});
        const json = await res.json();
        elOut.textContent = JSON.stringify(json, null, 2);
        elStatus.textContent = res.ok ? 'Done' : 'Error';
      };
    </script>
  </body>
</html>
